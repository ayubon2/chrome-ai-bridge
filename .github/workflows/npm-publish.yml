name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest (requires 11.5.1+ for OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Preflight checks
        run: |
          node -e "const pkg=require('./package.json'); if (!pkg.scripts?.build) { console.error('Missing npm script: build'); process.exit(1); }"
          npm pack --dry-run

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
